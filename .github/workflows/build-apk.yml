name: Build MultiPath VPN APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK
        run: |
          # Download command-line tools
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd /tmp
          curl -sL -o cmdline-tools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cmdline-tools.zip
          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          # Set env vars
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept Licenses & Install SDK Components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            --sdk_root=$ANDROID_HOME

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        id: build
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee gradle-output.txt
          exit ${PIPESTATUS[0]}

      - name: Upload Build Log (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Build-Log
          path: gradle-output.txt

      - name: Show Gradle Error Summary
        if: failure()
        run: |
          echo "=== Last 100 lines of Gradle output ==="
          tail -100 gradle-output.txt
          echo "=== End of output ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: MultiPathVPN-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
